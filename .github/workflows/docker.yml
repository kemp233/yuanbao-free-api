name: Build and Push Docker Image 

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

# 确保拥有写入 Packages 的权限
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 【关键修复】将仓库名转换为全小写，否则推送会报权限错误
      - name: Lowercase repo name
        id: repo_name
        run: echo "img_save_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 编译 amd64(电脑) 和 arm64(Armbian/树莓派)
          platforms: linux/amd64,linux/arm64
          # 使用处理后的小写名称
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.img_save_name }}:latest
            ghcr.io/${{ steps.repo_name.outputs.img_save_name }}:${{ github.sha }}
          # 开启缓存，下次编译会快很多
          cache-from: type=gha
          cache-to: type=gha,mode=max
