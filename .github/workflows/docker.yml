name: Build and Push Docker Image 

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

# 核心权限声明
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write  # 增加：包证明权限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 强制转换全小写（包括用户名和仓库名）
      - name: Lowercase repo name
        id: repo_name
        run: |
          echo "img_save_name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6 # 升级到 v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.img_save_name }}:latest
            ghcr.io/${{ steps.repo_name.outputs.img_save_name }}:${{ github.sha }}
          # 缓存设置，防止重复拉取重复编译
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 允许在推送失败时提供更多诊断信息
          provenance: false
